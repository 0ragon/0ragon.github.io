<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megara · Interactive Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(226,232,240,0.8); }
    </style>
</head>
<body class="min-h-screen">
    <main class="max-w-3xl mx-auto px-4 py-20">
        <header class="text-center mb-16">
            <div class="text-5xl mb-4">🧠</div>
            <h1 class="text-4xl font-extrabold text-slate-900 mb-3">Megara · Interactive Reports</h1>
            <p class="text-slate-600">Інтерактивні візуальні дослідження з бази знань Megara.</p>
        </header>

        <!-- Reports list. Add a new <a> block per report. -->
        <div class="space-y-4">
            <a href="neuroplasticity/" class="block glass-card rounded-2xl p-6 shadow-sm hover:shadow-md hover:border-indigo-300 transition">
                <div class="flex items-center gap-4">
                    <span class="text-3xl">⚡</span>
                    <div>
                        <h2 class="font-bold text-lg text-slate-900">Нейропластичність та РДУГ</h2>
                        <p class="text-sm text-slate-500">Анатомія помилки: ERN/Pe, хімічний каскад, специфіка РДУГ, інструментарій навчання.</p>
                    </div>
                </div>
            </a>
        </div>

        <footer class="mt-20 text-center text-xs uppercase tracking-widest text-slate-400">
            &copy; 2026 · Megara Knowledge Base
        </footer>
    </main>
</body>
</html>
